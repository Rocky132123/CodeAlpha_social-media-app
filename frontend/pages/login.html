<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link
        rel="stylesheet"
        href="../css/auth.css">

</head>

<body>

<div class="container">

    <h1>Login</h1>

    <form id="loginForm">

        <input
            type="text"
            id="username"
            placeholder="Username"
            required>

        <input
            type="password"
            id="password"
            placeholder="Password"
            required>

        <button type="submit">

            Login

        </button>

    </form>

    <div
        id="message"
        class="message">
    </div>

</div>

<script src="../js/config.js"></script>

<script src="../js/login.js"></script>

</body>
</html>
