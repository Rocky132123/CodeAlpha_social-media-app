<!DOCTYPE html>
<html>

<head>

    <title>Profile</title>

    <link
        rel="stylesheet"
        href="../css/profile.css">

</head>

<body>

<nav>

    <h2>My Profile</h2>

    <button id="logoutBtn">
        Logout
    </button>

</nav>

<div class="container">

    <div class="profile-card">

        <h2 id="username">
            Loading...
        </h2>

        <p id="email"></p>

        <label>

            Bio

        </label>

        <textarea
            id="bio">
        </textarea>

        <button id="saveBtn">

            Save Profile

        </button>

        <p id="message"></p>

    </div>

</div>

<script src="../js/config.js"></script>

<script src="../js/profile.js"></script>

</body>

</html>
